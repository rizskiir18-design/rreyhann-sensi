<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rreyhann Sensi Generator</title>

<style>
body {
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
  color: white;
  text-align: center;
  padding: 20px;
  margin: 0;
}

h1 {
  text-shadow: 0 0 20px #00f7ff;
}

.box {
  background: rgba(255,255,255,0.05);
  border-radius: 25px;
  padding: 25px;
  margin-top: 20px;
  backdrop-filter: blur(15px);
  box-shadow: 0 0 40px rgba(0,255,255,0.3);
  max-width: 400px;
  margin-left: auto;
  margin-right: auto;
}

button {
  width: 100%;
  margin-top: 10px;
  padding: 15px;
  border-radius: 15px;
  font-size: 16px;
  border: none;
  cursor: pointer;
  background: linear-gradient(45deg, #00f7ff, #00c3ff);
  font-weight: bold;
  transition: 0.2s;
}

button:active {
  transform: scale(0.95);
}

.result {
  margin-top: 20px;
  font-size: 16px;
  background: rgba(0,0,0,0.3);
  padding: 15px;
  border-radius: 15px;
}
</style>

</head>
<body>

<h1>🔥 Rreyhann Sensi 🔥</h1>
<p>Auto Headshot Generator</p>

<div class="box">

<button onclick="generateSensi()">⚡ Generate Sensi</button>
<button onclick="copySensi()">📋 Copy Sensi</button>
<button onclick="proMode()">🔥 Mode Sultan</button>

<div class="result" id="output">
Klik tombol untuk generate...
</div>

</div>

<script>

let lastSensi = "";

function random(min, max) {
  return Math.floor(Math.random() * (max - min + 1)) + min;
}

function generateSensi() {
  const sensi = {
    general: random(80, 100),
    redDot: random(70, 100),
    scope2x: random(60, 90),
    scope4x: random(50, 80),
    sniper: random(40, 70),
    freeLook: random(50, 80)
  };

  lastSensi = `
General: ${sensi.general}
Red Dot: ${sensi.redDot}
2x Scope: ${sensi.scope2x}
4x Scope: ${sensi.scope4x}
Sniper: ${sensi.sniper}
Free Look: ${sensi.freeLook}
`;

  document.getElementById("output").innerHTML = `
  <b>🎯 General:</b> ${sensi.general} <br>
  <b>🔴 Red Dot:</b> ${sensi.redDot} <br>
  <b>🔍 2x Scope:</b> ${sensi.scope2x} <br>
  <b>🔭 4x Scope:</b> ${sensi.scope4x} <br>
  <b>🎯 Sniper:</b> ${sensi.sniper} <br>
  <b>👁 Free Look:</b> ${sensi.freeLook}
  `;
}

function copySensi() {
  if (!lastSensi) {
    alert("Generate dulu sensinya!");
    return;
  }

  const textArea = document.createElement("textarea");
  textArea.value = lastSensi;
  document.body.appendChild(textArea);
  textArea.select();
  document.execCommand("copy");
  document.body.removeChild(textArea);

  alert("✅ Sensi berhasil di-copy!");
}

function proMode() {
  const sensi = {
    general: 100,
    redDot: 95,
    scope2x: 85,
    scope4x: 75,
    sniper: 65,
    freeLook: 80
  };

  lastSensi = `
(PRO MODE)
General: ${sensi.general}
Red Dot: ${sensi.redDot}
2x Scope: ${sensi.scope2x}
4x Scope: ${sensi.scope4x}
Sniper: ${sensi.sniper}
Free Look: ${sensi.freeLook}
`;

  document.getElementById("output").innerHTML = `
  🔥 <b>MODE SULTAN AKTIF</b> 🔥 <br><br>
  <b>🎯 General:</b> ${sensi.general} <br>
  <b>🔴 Red Dot:</b> ${sensi.redDot} <br>
  <b>🔍 2x Scope:</b> ${sensi.scope2x} <br>
  <b>🔭 4x Scope:</b> ${sensi.scope4x} <br>
  <b>🎯 Sniper:</b> ${sensi.sniper} <br>
  <b>👁 Free Look:</b> ${sensi.freeLook}
  `;
}

</script>

</body>
</html>
